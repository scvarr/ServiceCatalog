services:
  db:
    image: postgres:17-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      servicecatalog_net:
        ipv4_address: ${DB_CONTAINER_IP:-172.30.0.11}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: ${DB_CONTAINER_IP:-172.30.0.11}
    ports:
      - "${HOST_PORT:-8380}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      servicecatalog_net:
        ipv4_address: ${WEB_CONTAINER_IP:-172.30.0.10}

volumes:
  postgres_data:

networks:
  servicecatalog_net:
    name: servicecatalog_net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
