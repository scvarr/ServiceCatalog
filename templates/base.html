<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Каталог услуг</title><style>
body{font-family:system-ui,sans-serif;max-width:1100px;margin:2rem auto;padding:0 1rem}nav{display:flex;gap:1rem;margin-bottom:2rem}table{border-collapse:collapse;width:100%}th,td{padding:.5rem;border-bottom:1px solid #ddd;text-align:left}.message{padding:.5rem;background:#eef;margin:.5rem 0}
</style></head><body>
<nav><a href="{% url 'catalog:service_list' %}">Услуги</a><a href="{% url 'catalog:instance_list' %}">Экземпляры</a><a href="{% url 'contracts:contract_list' %}">Договоры</a><a href="/admin/">Администрирование</a>{% if user.is_authenticated %}<form method="post" action="{% url 'logout' %}">{% csrf_token %}<button>Выйти ({{ user.username }})</button></form>{% endif %}</nav>
{% for message in messages %}<p class="message">{{ message }}</p>{% endfor %}{% block content %}{% endblock %}
</body></html>
