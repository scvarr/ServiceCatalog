<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Каталог услуг</title><style>
body{font-family:system-ui,sans-serif;max-width:1100px;margin:2rem auto;padding:0 1rem;color:#172033}nav{display:flex;gap:1rem;align-items:center;margin-bottom:2rem}button,input,select{font:inherit}button,.button-link{padding:.35rem .65rem;border:1px solid #9aa7b8;border-radius:.25rem;background:#fff;color:#172033;cursor:pointer;text-decoration:none}button:hover,.button-link:hover{background:#f1f5f9}.button-secondary{background:#f8fafc}.message{padding:.5rem;background:#eef;margin:.5rem 0}.table-wrap{overflow-x:auto;border:1px solid #dbe2ea;border-radius:.4rem}.data-table{border-collapse:collapse;width:100%;background:#fff}.data-table th,.data-table td{padding:.65rem .75rem;border-bottom:1px solid #e2e8f0;text-align:left;vertical-align:top}.data-table th{background:#f8fafc;font-weight:650;white-space:nowrap}.data-table tbody tr:nth-child(even),.data-table tr:nth-child(even){background:#fcfdff}.data-table tr:last-child td{border-bottom:0}.details-table{margin-bottom:0}.list-toolbar{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap;margin-bottom:.5rem}.list-toolbar h1{margin:0}.search-form{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}.search-form input,.search-form select,.page-size-control select{padding:.35rem .45rem;border:1px solid #9aa7b8;border-radius:.25rem}.list-summary{margin:.5rem 0}.pagination{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin:.75rem 0}.page-size-control{display:flex;gap:.5rem;align-items:center;margin-top:.75rem}.columns-modal{border:0;border-radius:.5rem;padding:0;box-shadow:0 16px 48px rgba(15,23,42,.28);max-width:28rem;width:calc(100% - 2rem)}.columns-modal::backdrop{background:rgba(15,23,42,.42)}.columns-form,.columns-reset-form{padding:1rem}.columns-form fieldset{border:0;padding:0;margin:0}.columns-form legend{font-weight:650;margin-bottom:.7rem}.columns-form label{display:flex;gap:.5rem;align-items:center;padding:.25rem 0}.columns-form button{margin-top:.75rem}.columns-reset-form{padding-top:0;margin:0}.comparison-summary{display:flex;flex-wrap:wrap;gap:.5rem;margin:.75rem 0}.comparison-summary span,.comparison-status{display:inline-block;padding:.2rem .45rem;border-radius:.25rem;background:#e2e8f0}.status-match{background:#dcfce7}.status-within_tolerance{background:#fef3c7}.status-exceeded,.status-shortfall{background:#fee2e2}.status-composition_changed{background:#dbeafe}.status-incomplete,.status-missing_term{background:#e5e7eb}.project-form p{display:flex;flex-direction:column;gap:.25rem;max-width:32rem}
</style></head><body>
<nav><a href="{% url 'catalog:service_list' %}">Услуги</a><a href="{% url 'catalog:instance_list' %}">Экземпляры</a><a href="{% url 'contracts:contract_list' %}">Договоры</a><a href="/admin/">Администрирование</a>{% if user.is_authenticated %}<form method="post" action="{% url 'logout' %}">{% csrf_token %}<button>Выйти ({{ user.username }})</button></form>{% endif %}</nav>
{% for message in messages %}<p class="message">{{ message }}</p>{% endfor %}{% block content %}{% endblock %}
</body></html>
