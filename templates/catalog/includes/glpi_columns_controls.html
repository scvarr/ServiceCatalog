<details class="columns-panel">
  <summary>Столбцы</summary>
  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="action" value="save_preferences">
    <fieldset><legend>Отображаемые столбцы</legend>
      {% for column in glpi_columns %}<label><input type="checkbox" name="visible_columns" value="{{ column.key }}"{% if column.key in visible_glpi_column_keys %} checked{% endif %}> {{ column.label }}</label>{% endfor %}
    </fieldset>
    <input type="hidden" name="page_size" value="25">
    <button type="submit">Сохранить</button>
  </form>
  <form method="post" class="reset-form">
    {% csrf_token %}<input type="hidden" name="action" value="reset_preferences"><button type="submit">Вернуть по умолчанию</button>
  </form>
</details>
