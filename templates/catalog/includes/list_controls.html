<div class="list-toolbar">
  <form method="get" class="search-form">
    <label for="list-search">Поиск</label>
    <input id="list-search" name="q" value="{{ query }}" placeholder="Поиск">
    {% if list_kind == "instance" %}
      <label for="instance-type">Тип</label>
      <select id="instance-type" name="type">
        <option value="">Все типы</option>
        {% for type in types %}<option value="{{ type.pk }}"{% if selected_type == type.pk|stringformat:"s" %} selected{% endif %}>{{ type.name }}</option>{% endfor %}
      </select>
      <label for="instance-status">Состояние</label>
      <select id="instance-status" name="status">
        <option value="">Все состояния</option>
        {% for value, label in status_choices %}<option value="{{ value }}"{% if selected_status == value %} selected{% endif %}>{{ label }}</option>{% endfor %}
      </select>
    {% endif %}
    <input type="hidden" name="page_size" value="{{ page_size }}">
    <button type="submit">Найти</button>
  </form>

  <button type="button" class="button-secondary" onclick="document.getElementById('columns-modal').showModal()">Столбцы</button>
  <dialog id="columns-modal" class="columns-modal" aria-labelledby="columns-modal-title">
    <form method="post" class="columns-form">
      {% csrf_token %}
      <input type="hidden" name="action" value="save_preferences">
      <input type="hidden" name="q" value="{{ query }}">
      {% if list_kind == "instance" %}<input type="hidden" name="type" value="{{ selected_type }}"><input type="hidden" name="status" value="{{ selected_status }}">{% endif %}
      <input type="hidden" name="page" value="{{ page_obj.number }}">
      <fieldset>
        <legend id="columns-modal-title">Отображаемые столбцы</legend>
        {% for column in columns %}
          <label><input type="checkbox" name="visible_columns" value="{{ column.key }}"{% if column.key in visible_column_keys %} checked{% endif %}{% if column.required %} disabled{% endif %}> {{ column.label }}{% if column.required %} (обязательный){% endif %}</label>
        {% endfor %}
      </fieldset>
      <input type="hidden" name="page_size" value="{{ page_size }}">
      <button type="submit">Сохранить</button>
      <button type="button" class="button-secondary" onclick="document.getElementById('columns-modal').close()">Отмена</button>
    </form>
    <form method="post" class="reset-form columns-reset-form">
      {% csrf_token %}
      <input type="hidden" name="action" value="reset_preferences">
      <input type="hidden" name="q" value="{{ query }}">
      {% if list_kind == "instance" %}<input type="hidden" name="type" value="{{ selected_type }}"><input type="hidden" name="status" value="{{ selected_status }}">{% endif %}
      <input type="hidden" name="page" value="{{ page_obj.number }}">
      <input type="hidden" name="page_size" value="{{ page_size }}">
      <button type="submit">Вернуть по умолчанию</button>
    </form>
  </dialog>
</div>
<p class="list-summary">Найдено: {{ page_obj.paginator.count }}.</p>
