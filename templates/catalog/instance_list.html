{% extends "base.html" %}{% block content %}<h1>Экземпляры</h1><form><input name="q" value="{{ request.GET.q }}" placeholder="Поиск"><select name="type"><option value="">Все типы</option>{% for type in types %}<option value="{{ type.pk }}">{{ type.name }}</option>{% endfor %}</select><select name="status"><option value="">Все состояния</option>{% for value,label in instances.model.Status.choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}</select><button>Фильтровать</button></form><table><tr><th>Код</th><th>Наименование</th><th>Тип</th><th>Состояние</th></tr>{% for instance in instances %}<tr><td><a href="{% url 'catalog:instance_detail' instance.pk %}">{{ instance.catalog_code }}</a></td><td>{{ instance.name }}</td><td>{{ instance.instance_type }}</td><td>{{ instance.get_status_display }}</td></tr>{% empty %}<tr><td colspan="4">Экземпляров нет.</td></tr>{% endfor %}</table>{% endblock %}
