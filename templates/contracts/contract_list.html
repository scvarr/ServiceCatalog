{% extends "base.html" %}
{% block content %}
<h1>Договоры</h1>
<div class="table-wrap"><table class="data-table"><tr><th>Номер</th><th>Наименование</th><th>Период</th><th>Статус</th></tr>{% for contract in contracts %}<tr><td><a href="{% url 'contracts:contract_detail' contract.pk %}">{{ contract.number }}</a></td><td>{{ contract.name }}</td><td>{{ contract.start_date }} — {{ contract.end_date }}</td><td>{{ contract.get_status_display }}</td></tr>{% empty %}<tr><td colspan="4">Договоров нет.</td></tr>{% endfor %}</table></div>
{% endblock %}
